<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>內容管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
  
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-6">內容管理後台</h1>

    <section class="mb-10">
      <h2 class="text-xl font-semibold mb-4">文字內容</h2>
      <form id="textsForm" class="grid grid-cols-1 md:grid-cols-2 gap-4"></form>
      <button id="saveTextsBtn" class="mt-4 px-4 py-2 bg-green-500 text-black font-bold rounded">儲存文字</button>
      <div id="textsStatus" class="mt-2 text-sm text-gray-300"></div>
    </section>

    <section class="mb-10">
      <h2 class="text-xl font-semibold mb-4">彈出視窗與連結</h2>
      <div id="popupsForm" class="space-y-4"></div>
      <button id="savePopupsBtn" class="mt-4 px-4 py-2 bg-cyan-500 text-black font-bold rounded">儲存彈窗</button>
      <div id="popupsStatus" class="mt-2 text-sm text-gray-300"></div>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-4">作品圖片上傳</h2>
      <form id="imageUploadForm" class="flex flex-col md:flex-row md:items-end gap-3">
        <div class="flex-1">
          <label class="block text-sm mb-1">標題</label>
          <input type="text" name="title" class="w-full px-3 py-2 rounded bg-slate-800 border border-slate-700">
        </div>
        <div class="flex-1">
          <label class="block text-sm mb-1">圖片檔案</label>
          <input type="file" name="image" accept="image/*" class="w-full px-3 py-2 rounded bg-slate-800 border border-slate-700">
        </div>
        <button type="submit" class="px-4 py-2 bg-blue-500 text-black font-bold rounded">上傳圖片</button>
      </form>
      <div id="imagesStatus" class="mt-2 text-sm text-gray-300"></div>
      <div id="imagesList" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4"></div>
    </section>
  </div>

  <script>
    let contentData = null;

    async function loadContent() {
      const resp = await fetch('/api/content');
      contentData = await resp.json();
      buildTextsForm();
      buildPopupsForm();
      await renderImages();
    }

    function buildTextsForm() {
      const form = document.getElementById('textsForm');
      form.innerHTML = '';
      const entries = Object.entries(contentData.texts);
      entries.forEach(([key, value]) => {
        const wrap = document.createElement('div');
        const label = document.createElement('label');
        label.className = 'block text-sm mb-1';
        label.innerText = key;
        const input = document.createElement('input');
        input.className = 'w-full px-3 py-2 rounded bg-slate-800 border border-slate-700';
        input.value = value;
        input.dataset.key = key;
        wrap.appendChild(label);
        wrap.appendChild(input);
        form.appendChild(wrap);
      });
    }

    function buildPopupsForm() {
      const container = document.getElementById('popupsForm');
      container.innerHTML = '';
      const entries = Object.entries(contentData.popups);
      entries.forEach(([key, item]) => {
        const card = document.createElement('div');
        card.className = 'p-4 rounded bg-slate-800 border border-slate-700';
        const titleInput = document.createElement('input');
        titleInput.className = 'w-full mb-2 px-3 py-2 rounded bg-slate-700';
        titleInput.value = item.title || '';
        titleInput.placeholder = '標題';
        titleInput.dataset.field = 'title';
        const contentInput = document.createElement('textarea');
        contentInput.className = 'w-full mb-2 px-3 py-2 rounded bg-slate-700';
        contentInput.value = item.content || '';
        contentInput.placeholder = '內容';
        contentInput.rows = 3;
        contentInput.dataset.field = 'content';
        const linkInput = document.createElement('input');
        linkInput.className = 'w-full mb-2 px-3 py-2 rounded bg-slate-700';
        linkInput.value = item.link || '';
        linkInput.placeholder = '連結（含 http:// 或 https://）';
        linkInput.dataset.field = 'link';
        const autoWrap = document.createElement('label');
        autoWrap.className = 'inline-flex items-center gap-2 text-sm';
        const autoCheckbox = document.createElement('input');
        autoCheckbox.type = 'checkbox';
        autoCheckbox.checked = !!item.autoRedirect;
        autoCheckbox.dataset.field = 'autoRedirect';
        const keyBadge = document.createElement('div');
        keyBadge.className = 'text-xs text-gray-400 mt-2';
        keyBadge.innerText = key;
        autoWrap.appendChild(autoCheckbox);
        autoWrap.appendChild(document.createTextNode('點擊自動轉移'));
        card.appendChild(titleInput);
        card.appendChild(contentInput);
        card.appendChild(linkInput);
        card.appendChild(autoWrap);
        card.appendChild(keyBadge);
        card.dataset.key = key;
        container.appendChild(card);
      });
    }

    async function saveTexts() {
      const inputs = document.querySelectorAll('#textsForm [data-key]');
      const payload = {};
      inputs.forEach(i => payload[i.dataset.key] = i.value);
      const resp = await fetch('/api/content/texts', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      document.getElementById('textsStatus').innerText = data.ok ? '已儲存' : '儲存失敗';
    }

    async function savePopups() {
      const cards = document.querySelectorAll('#popupsForm [data-key]');
      const payload = {};
      cards.forEach(card => {
        const key = card.dataset.key;
        const fields = card.querySelectorAll('[data-field]');
        const item = {};
        fields.forEach(f => {
          if (f.dataset.field === 'autoRedirect') {
            item.autoRedirect = f.checked;
          } else {
            item[f.dataset.field] = f.value;
          }
        });
        payload[key] = item;
      });
      const resp = await fetch('/api/content/popups', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      document.getElementById('popupsStatus').innerText = data.ok ? '已儲存' : '儲存失敗';
    }

    async function renderImages() {
      const list = document.getElementById('imagesList');
      list.innerHTML = '';
      let images = [];
      try {
        const r = await fetch('/api/works/images-list');
        images = await r.json();
      } catch {}
      images.forEach(img => {
        const wrap = document.createElement('div');
        wrap.className = 'rounded overflow-hidden border border-slate-700';
        const image = document.createElement('img');
        image.src = img.thumb || img.url;
        image.className = 'w-full h-32 object-cover';
        const caption = document.createElement('div');
        caption.className = 'px-2 py-1 text-xs text-gray-300';
        caption.innerText = img.title || '';
        wrap.appendChild(image);
        wrap.appendChild(caption);
        list.appendChild(wrap);
      });
    }

    async function uploadImage(e) {
      e.preventDefault();
      const form = document.getElementById('imageUploadForm');
      const fd = new FormData(form);
      const resp = await fetch('/api/works/images', {
        method: 'POST',
        body: fd
      });
      const data = await resp.json();
      document.getElementById('imagesStatus').innerText = data.ok ? '已上傳' : '上傳失敗';
      await renderImages();
    }

    document.getElementById('saveTextsBtn').addEventListener('click', saveTexts);
    document.getElementById('savePopupsBtn').addEventListener('click', savePopups);
    document.getElementById('imageUploadForm').addEventListener('submit', uploadImage);

    loadContent();
  </script>
</body>
</html>
